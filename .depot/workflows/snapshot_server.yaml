# Depot CI snapshot image for the server test suite
#
# Builds a reusable sandbox image with all server dependencies pre-installed
# (uv cache + venv, pnpm store, CJK fonts, Tinybird CLI, container images) and
# pushes it to the Depot registry. Consuming jobs start from this image so the
# heavy install steps become near-instant cache hits.
#
# Snapshots capture the FILESYSTEM only — not env vars or $GITHUB_PATH. Consuming
# jobs must still run the setup-* actions to restore PATH/env, but the underlying
# downloads are already on disk.
#
# Auth to the Depot registry is automatic on Depot CI; no REGISTRY_* env needed.

name: Server Snapshot
on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "server/uv.lock"
      - "server/pyproject.toml"
      - ".depot/workflows/snapshot_server.yaml"
jobs:
  snapshot:
    name: "Build server CI snapshot \U0001F4E6"
    runs-on: depot-ubuntu-24.04-8
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "server/pyproject.toml"
      - name: "\U0001F527 uv install"
        working-directory: ./server
        run: uv sync --dev --frozen
      - name: "\U0001F6DF Warm mypy cache"
        working-directory: ./server
        run: MYPY_CACHE_DIR="$HOME/.mypy_cache" uv run task lint_types
      - name: Pull container images
        run: |
          docker pull postgres:15.1-bullseye
          docker pull redis:7.4-alpine
          docker pull bitnamilegacy/minio:2024.5.28
          docker pull tinybirdco/tinybird-local:latest
      - uses: pnpm/action-setup@v6.0.8
        with:
          package_json_file: server/emails/package.json
      - name: "\U0001F4EC Setup Node.js environment for server/emails"
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: server/emails/.node-version
          cache: "pnpm"
          cache-dependency-path: "clients/pnpm-lock.yaml"
      - name: "\U0001F4EC Build server/emails"
        working-directory: server/emails
        run: pnpm install --frozen-lockfile && pnpm build
      - name: Install CJK fonts
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk
      - name: "\U0001F426 Install Tinybird CLI"
        run: curl -sSL https://tinybird.co/install.sh | bash && echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Expose tools on default PATH
        run: |
          sudo ln -sf "$(command -v uv)" /usr/local/bin/uv
          sudo ln -sf "$(command -v uvx)" /usr/local/bin/uvx
          sudo ln -sf "$HOME/.local/bin/tb" /usr/local/bin/tb
      - uses: depot/snapshot-action@v1
        with:
          image: pkpmg8f64v.registry.depot.dev/ci-server-snapshot:v1
