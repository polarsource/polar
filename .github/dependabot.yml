# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.

version: 2
updates:
  - package-ecosystem: "github-actions" # See documentation for possible values
    directory: "/" # Location of package manifests
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      actions:
        patterns:
          - "*"
  - package-ecosystem: "uv"
    directory: "/server"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      server-production:
        dependency-type: "production"
        patterns:
          - "*"
        exclude-patterns:
          - "stripe"
      server-development:
        dependency-type: "development"
        patterns:
          - "*"
  - package-ecosystem: "npm"
    directory: "/clients"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      clients-production:
        dependency-type: "production"
        patterns:
          - "*"
      clients-development:
        dependency-type: "development"
        patterns:
          - "*"
    ignore:
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: "npm"
    directory: "/server/emails"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      emails-production:
        dependency-type: "production"
        patterns:
          - "*"
      emails-development:
        dependency-type: "development"
        patterns:
          - "*"
    ignore:
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: "npm"
    directory: "/docs"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      docs-production:
        dependency-type: "production"
        patterns:
          - "*"
      docs-development:
        dependency-type: "development"
        patterns:
          - "*"
    ignore:
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: "npm"
    directory: "/handbook"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      handbook-production:
        dependency-type: "production"
        patterns:
          - "*"
      handbook-development:
        dependency-type: "development"
        patterns:
          - "*"
    ignore:
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
