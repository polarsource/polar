name: "Deploy Lock 🔒"

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are deploys being locked?"
        required: true
        type: string

permissions: {}

jobs:
  lock:
    runs-on: ubuntu-latest
    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.EMERGENCY_MERGE_APP_ID }}
          private-key: ${{ secrets.EMERGENCY_MERGE_APP_PRIVATE_KEY }}

      - name: Enable deploy-lock ruleset
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh api --method PUT \
            /repos/${{ github.repository }}/rulesets/${{ vars.DEPLOY_LOCK_RULESET_ID }} \
            -f enforcement=active

      - name: Announce in Slack
        uses: slackapi/slack-github-action@v3.0.2
        with:
          method: chat.postMessage
          token: ${{ secrets.E2E_SLACK_BOT_TOKEN }}
          errors: true
          payload: |
            {
              "channel": "C093CJXJXPT",
              "text": "Deploys locked by ${{ github.actor }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":lock: *Deploys locked* by *${{ github.actor }}*\n*Reason:* ${{ inputs.reason }}\n\nNeed to ship urgently? Comment `/emergency` on your PR — this bypasses the lock."
                  }
                }
              ]
            }
