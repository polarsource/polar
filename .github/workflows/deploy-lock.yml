name: "Deploy Lock 🔒"

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are deploys being locked?"
        required: true
        type: string

permissions: {}

jobs:
  lock:
    runs-on: ubuntu-latest
    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v3.2.0
        with:
          app-id: ${{ secrets.EMERGENCY_MERGE_APP_ID }}
          private-key: ${{ secrets.EMERGENCY_MERGE_APP_PRIVATE_KEY }}

      - name: Enable deploy-lock ruleset
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh api --method PUT \
            /repos/${{ github.repository }}/rulesets/${{ vars.DEPLOY_LOCK_RULESET_ID }} \
            -f enforcement=active
