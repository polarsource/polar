name: Dev CLI

on:
  push:
    branches: ["main"]
  pull_request:
    types: [opened, synchronize, edited]
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: "Detect changes"
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      dev_cli: ${{ steps.filter.outputs.dev_cli }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            dev_cli:
              - 'dev/cli/**'
              - '.github/workflows/test_dev_cli.yaml'

  lint:
    name: "Dev CLI: Lint 📝"
    needs: changes
    if: needs.changes.outputs.dev_cli == 'true'
    timeout-minutes: 5
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: 🐶 Lint (ruff)
        working-directory: ./dev/cli
        run: uv run --with ruff ruff check .
