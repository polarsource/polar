name: "E2E Tests"

on:
  pull_request:
    types: [opened, synchronize]
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

defaults:
  run:
    working-directory: ./clients/apps/web

permissions:
  contents: read

jobs:
  changes:
    name: "Detect changes"
    if: github.event_name == 'pull_request'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      clients: ${{ steps.filter.outputs.clients }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            clients:
              - 'clients/**'
              - '.github/workflows/test_e2e.yaml'

  e2e:
    name: "E2E Tests 🎭"
    needs: changes
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.clients == 'true'
    timeout-minutes: 15
    runs-on: blacksmith-4vcpu-ubuntu-2404

    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      NEXT_PUBLIC_API_URL: ${{ github.event_name == 'schedule' && vars.E2E_PRODUCTION_API_URL || vars.E2E_API_URL }}
      E2E_CHECKOUT_LINK_SUBSCRIPTION: ${{ github.event_name == 'schedule' && secrets.E2E_PRODUCTION_CHECKOUT_LINK_SUBSCRIPTION || secrets.E2E_CHECKOUT_LINK_SUBSCRIPTION }}

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: clients/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: clients/.node-version
          cache: "pnpm"
          cache-dependency-path: "clients/pnpm-lock.yaml"

      - name: Install dependencies
        run: pnpm install
        working-directory: ./clients

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(pnpm exec playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install chromium

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Notify Slack on failure
        if: failure() && github.event_name == 'schedule'
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.E2E_SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "🚨 E2E tests failed against production",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "🚨 *E2E tests failed against production*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
                  }
                }
              ]
            }
