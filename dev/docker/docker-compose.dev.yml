# Per-instance Polar app stack (api, worker, web).
# Infra (postgres, redis, minio, tinybird, prometheus, grafana) lives in a
# separate, machine-wide stack defined in docker-compose.shared.yml.
#
# Usage: dev docker up                # auto-starts shared infra if needed
#        dev docker -i 2 up           # second isolated app stack
#
# Each instance gets its own DB name, Redis DB index, and S3 bucket names so
# multiple instances can safely coexist on one shared infra stack.

# Load environment variables from server/.env
x-common-env-file: &common-env-file
  - ../../server/.env

x-common-backend-env: &common-backend-env
  POLAR_ENV: development
  POLAR_LOG_LEVEL: DEBUG
  POLAR_TESTING: "0"
  POLAR_SQLALCHEMY_DEBUG: "0"
  POLAR_POSTHOG_DEBUG: "1"
  # Database — connect to shared postgres on the polar-shared network.
  # Each instance uses a separate logical DB (auto-created by startup.sh).
  POLAR_POSTGRES_USER: ${POLAR_POSTGRES_USER:-polar}
  POLAR_POSTGRES_PWD: ${POLAR_POSTGRES_PWD:-polar}
  POLAR_POSTGRES_HOST: db
  POLAR_POSTGRES_PORT: "5432"
  POLAR_POSTGRES_DATABASE: polar_dev_${POLAR_DOCKER_INSTANCE:-1}
  POLAR_POSTGRES_READ_USER: ${POLAR_POSTGRES_READ_USER:-polar_read}
  POLAR_POSTGRES_READ_PWD: ${POLAR_POSTGRES_READ_PWD:-polar}
  POLAR_POSTGRES_READ_HOST: db
  POLAR_POSTGRES_READ_PORT: "5432"
  POLAR_POSTGRES_READ_DATABASE: polar_dev_${POLAR_DOCKER_INSTANCE:-1}
  # Redis — shared instance; each app instance picks its own DB index.
  POLAR_REDIS_HOST: redis
  POLAR_REDIS_PORT: "6379"
  POLAR_REDIS_DB: ${POLAR_REDIS_DB:-0}
  # S3/MinIO — shared instance; each app instance gets its own bucket pair.
  POLAR_S3_ENDPOINT_URL: http://minio:9000
  POLAR_AWS_ACCESS_KEY_ID: ${POLAR_AWS_ACCESS_KEY_ID:-polar-development}
  POLAR_AWS_SECRET_ACCESS_KEY: ${POLAR_AWS_SECRET_ACCESS_KEY:-polar123456789}
  POLAR_S3_FILES_BUCKET_NAME: polar-s3-${POLAR_DOCKER_INSTANCE:-1}
  POLAR_S3_FILES_PUBLIC_BUCKET_NAME: polar-s3-public-${POLAR_DOCKER_INSTANCE:-1}
  POLAR_S3_CUSTOMER_INVOICES_BUCKET_NAME: polar-s3-${POLAR_DOCKER_INSTANCE:-1}
  POLAR_S3_CUSTOMER_RECEIPTS_BUCKET_NAME: polar-s3-${POLAR_DOCKER_INSTANCE:-1}
  POLAR_S3_PAYOUT_INVOICES_BUCKET_NAME: polar-s3-${POLAR_DOCKER_INSTANCE:-1}
  # CORS and allowed hosts — configured for Docker networking
  POLAR_CORS_ORIGINS: '["http://localhost:${WEB_PORT:-3000}", "http://127.0.0.1:${WEB_PORT:-3000}", "http://web:3000"]'
  POLAR_ALLOWED_HOSTS: '["localhost:${WEB_PORT:-3000}", "127.0.0.1:${WEB_PORT:-3000}"]'
  POLAR_FRONTEND_BASE_URL: http://localhost:${WEB_PORT:-3000}
  POLAR_CHECKOUT_BASE_URL: http://localhost:${API_PORT:-8000}/v1/checkout-links/{client_secret}/redirect
  POLAR_USER_SESSION_COOKIE_DOMAIN: localhost
  # Tinybird — shared instance. Queries filter by organization_id and each
  # instance has its own postgres DB, so org UUIDs are globally disjoint and
  # cross-instance leakage is impossible. Tokens are auto-discovered from the
  # running container at startup (see startup.sh).
  POLAR_TINYBIRD_API_URL: http://tinybird:7181
  POLAR_TINYBIRD_CLICKHOUSE_URL: http://tinybird:7182
  # OAuth insecure transport for development
  AUTHLIB_INSECURE_TRANSPORT: "true"
  # Note: Secrets like POLAR_GITHUB_CLIENT_ID, POLAR_STRIPE_* are loaded from
  # env_file (server/.env) and NOT set here. Setting them here with ${VAR:-default}
  # would read from the HOST shell, not from env_file.
  # Prometheus (optional)
  POLAR_PROMETHEUS_REMOTE_WRITE_URL: ${POLAR_PROMETHEUS_REMOTE_WRITE_URL:-}

x-api-volumes: &api-volumes
  - ../../server:/app/server:cached
  - ../../dev:/app/dev:cached
  - server_uv_cache:/root/.cache/uv
  - api_venv:/app/server/.venv
  - pnpm_store:/root/.local/share/pnpm/store

x-worker-volumes: &worker-volumes
  - ../../server:/app/server:cached
  - ../../dev:/app/dev:cached
  - server_uv_cache:/root/.cache/uv
  - worker_venv:/app/server/.venv
  - pnpm_store:/root/.local/share/pnpm/store

services:
  api:
    build:
      context: ../..
      dockerfile: dev/docker/Dockerfile.api.dev
    env_file: *common-env-file
    environment:
      <<: *common-backend-env
    volumes: *api-volumes
    ports:
      - "${API_PORT:-8000}:8000"
    networks:
      # `default` is a per-project bridge so web→api stays scoped to this
      # instance (the `api` service name would otherwise collide with other
      # instances' api containers also on polar-shared).
      - default
      - polar-shared
    command: ["api"]

  worker:
    build:
      context: ../..
      dockerfile: dev/docker/Dockerfile.api.dev
    env_file: *common-env-file
    environment:
      <<: *common-backend-env
    volumes: *worker-volumes
    networks:
      - default
      - polar-shared
    depends_on:
      api:
        condition: service_started
    command: ["worker"]

  web:
    build:
      context: ../..
      dockerfile: dev/docker/Dockerfile.web.dev
    env_file: *common-env-file
    environment:
      # Node memory limit to prevent OOM (keep well below container limit to leave room for native memory)
      NODE_OPTIONS: "--max-old-space-size=2560"
      # NEXT_PUBLIC_* are for browser requests (via host machine)
      NEXT_PUBLIC_API_URL: http://localhost:${API_PORT:-8000}
      NEXT_PUBLIC_FRONTEND_BASE_URL: http://localhost:${WEB_PORT:-3000}
      NEXT_PUBLIC_BACKOFFICE_URL: http://localhost:${API_PORT:-8000}/backoffice
      # Note: NEXT_PUBLIC_STRIPE_KEY and NEXT_PUBLIC_GITHUB_APP_NAMESPACE
      # must be set in server/.env (they're loaded via env_file)
      # POLAR_API_URL is for server-side requests (container-to-container)
      POLAR_API_URL: http://api:8000
      # Browser-side MinIO uploads require a host-reachable MinIO. Shared
      # infra doesn't publish a host port by default, so direct browser
      # uploads won't work in this dev model — file features that round-trip
      # through the API still work fine.
      S3_PUBLIC_IMAGES_BUCKET_PROTOCOL: http
      S3_PUBLIC_IMAGES_BUCKET_HOSTNAME: localhost
      S3_PUBLIC_IMAGES_BUCKET_PORT: "9000"
      S3_PUBLIC_IMAGES_BUCKET_PATHNAME: "**"
      S3_UPLOAD_ORIGINS: http://localhost:9000
    volumes:
      - ../../clients:/app/clients:cached
      - ../../dev:/app/dev:cached
      - web_node_modules:/app/clients/node_modules
      - web_next_cache:/app/clients/apps/web/.next
    ports:
      - "${WEB_PORT:-3000}:3000"
    networks:
      # web only needs to reach the same-project api (SSR proxy); browser
      # talks to all infra via host ports. Keeping it off polar-shared means
      # `http://api:8000` resolves unambiguously to THIS instance's api.
      - default
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 6G

networks:
  default:
    name: polar-app-${POLAR_DOCKER_INSTANCE:-1}-default
  polar-shared:
    external: true

volumes:
  server_uv_cache:
  api_venv:
  worker_venv:
  pnpm_store:
  web_node_modules:
  web_next_cache:
