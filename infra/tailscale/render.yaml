services:
  - type: worker
    name: polar-subnet-router
    env: docker
    autoDeploy: false
    envVars:
      - key: TAILSCALE_AUTHKEY
        sync: false
      - key: TAILSCALE_VERSION
        value: 1.94.2
      - key: ADVERTISE_ROUTES
        value: 10.208.0.0/16
    disk:
      name: tailscale-state
      mountPath: /var/lib/tailscale
      sizeGB: 1
