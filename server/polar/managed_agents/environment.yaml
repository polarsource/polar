# Self-hosted sandbox environment for Polar's Plain triage agent.
#
# Apply with: ant beta:environments create < environment.yaml
#
# With type: self_hosted, the agent loop still runs on Anthropic, but
# tool execution happens inside a worker we operate ourselves
# (server/polar/managed_agents/worker.py). The DB credential lives only
# in the worker container; the agent.yaml still gates Plain MCP via the
# vault credential + Plain Machine User scope.
#
# `networking` and `packages` do not apply to self_hosted — you control
# the worker container's egress directly.

name: polar-plain-triage
description: >
  Self-hosted sandbox for Polar's Plain support triage agent. Tool
  execution runs in Polar's VPC; the DB connection (polar_read role
  over Tailscale) lives inside the worker container.

config:
  type: self_hosted

metadata:
  team: support-eng
  repo: polarsource/polar
